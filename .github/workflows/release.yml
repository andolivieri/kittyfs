name: Publish latest release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all targets
        run: make build-all VERSION=$(git rev-parse --short HEAD)

      # Drop the previous rolling release (and its tag) so only one ever exists.
      - name: Delete previous latest release
        run: gh release delete latest --cleanup-tag --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest build
          body: Best kittyFS release ever 👍
          make_latest: true
          files: |
            dist/kittyfs-windows-amd64.exe
            dist/kittyfs-linux-amd64
            dist/kittyfs-darwin-amd64
            dist/kittyfs-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
